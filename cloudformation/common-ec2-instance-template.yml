AWSTemplateFormatVersion: "2010-09-09"
Description: CloudFormation template for creating EC2 instances with same
  permission policy, AZ, and existing security groups

Parameters:
  InstanceType:
    Type: String
    Default: t2.micro
    Description: EC2 instance type
  AmiId:
    Type: AWS::EC2::Image::Id
    Default: ami-0b20f552f63953f0e
    Description: AMI ID for the EC2 instance (default is Ubuntu 24.04 in ap-northeast-1)
  AvailabilityZone:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: ap-northeast-1c
    Description: The Availability Zone to launch the instance into
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance
  InstanceName:
    Type: String
    Default: coseeing-instance
    Description: Name tag for the EC2 instance
  SecurityGroups:
    Type: List<AWS::EC2::SecurityGroup::Id>
    Default: "sg-098baa9d7eaf501a8,sg-0d260cbf1556be14b,sg-09786ad8171652b3b"
    Description: List of security group IDs to attach to the EC2 instance
  DiskSize:
    Type: Number
    Default: 8
    Description: Size of the root EBS volume in GB
  RdsName:
    Type: String
    Description: Name of the RDS instance
    Default: ""
  RdsEndpoint:
    Type: String
    Description: Endpoint of the RDS instance
    Default: ""

Conditions:
  CreateRdsPrivateLink: !Not [!Equals [!Ref RdsName, ""]]

Resources:
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AmiId
      AvailabilityZone: !Ref AvailabilityZone
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds: 
        - !Ref SecurityGroups
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: !Ref DiskSize
            VolumeType: gp3
      Tags:
        - Key: Name
          Value: !Ref InstanceName

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - coseeing-ec2-common

  EC2RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: CreateRdsPrivateLink
    Properties:
      GroupDescription: Security group for EC2 to RDS connection
      VpcId: !GetAtt EC2Instance.VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          DestinationSecurityGroupId: !Ref RdsSecurityGroup

  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: CreateRdsPrivateLink
    Properties:
      GroupDescription: Security group for RDS to EC2 connection
      VpcId: !GetAtt EC2Instance.VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref EC2RdsSecurityGroup

  EC2InstanceSecurityGroupAttachment:
    Type: AWS::EC2::InstanceSecurityGroupAttachment
    Condition: CreateRdsPrivateLink
    Properties:
      InstanceId: !Ref EC2Instance
      SecurityGroupId: !Ref EC2RdsSecurityGroup

  RdsSecurityGroupAttachment:
    Type: AWS::RDS::DBInstance
    Condition: CreateRdsPrivateLink
    Properties:
      DBInstanceIdentifier: !Ref RdsName
      VPCSecurityGroups:
        - !Ref RdsSecurityGroup

Outputs:
  InstanceId:
    Description: The Instance ID
    Value: !Ref EC2Instance
  PublicDNS:
    Description: Public DNS of the EC2 instance
    Value: !GetAtt EC2Instance.PublicDnsName
  InstancePublicIp:
    Description: The public IP address of the EC2 instance
    Value: !GetAtt [EC2Instance, PublicIp]
