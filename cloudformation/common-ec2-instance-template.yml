AWSTemplateFormatVersion: "2010-09-09"
Description: CloudFormation template for creating EC2 instances with same
  permission policy, AZ, and existing security groups

Parameters:
  InstanceType:
    Type: String
    Default: t2.micro
    Description: EC2 instance type
  AmiId:
    Type: AWS::EC2::Image::Id
    Default: ami-0b20f552f63953f0e
    Description: AMI ID for the EC2 instance (default is Ubuntu 24.04 in ap-northeast-1)
  AvailabilityZone:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: ap-northeast-1c
    Description: The Availability Zone to launch the instance into
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance
  InstanceName:
    Type: String
    Default: coseeing-instance
    Description: Name tag for the EC2 instance
  SecurityGroups:
    Type: List<AWS::EC2::SecurityGroup::Id>
    Default: "sg-098baa9d7eaf501a8,sg-0d260cbf1556be14b,sg-09786ad8171652b3b"
    Description: List of security group IDs to attach to the EC2 instance
  DiskSize:
    Type: Number
    Default: 8
    Description: Size of the root EBS volume in GB
  PrivateRouteTableId:
    Type: AWS::EC2::RouteTable::Id
    Description: ID of the private route table for the VPC
  RdsName:
    Type: String
    Description: Name of the RDS instance
    Default: ""
  RdsEndpoint:
    Type: String
    Description: Endpoint of the RDS instance
    Default: ""

Conditions:
  CreateRdsPrivateLink: !Not [!Equals [!Ref RdsName, ""]]

Resources:
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AmiId
      AvailabilityZone: !Ref AvailabilityZone
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds: !Ref SecurityGroups
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: !Ref DiskSize
            VolumeType: gp3
      Tags:
        - Key: Name
          Value: !Ref InstanceName

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - coseeing-ec2-common

  # VPC Endpoint for RDS
  RdsVpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: CreateRdsPrivateLink
    Properties:
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.rds'
      VpcEndpointType: Interface
      VpcId: !Ref VpcId
      SubnetIds: 
        - !Ref PrivateSubnetId
      SecurityGroupIds:
        - !Ref VpcEndpointSecurityGroup

  # Security Group for VPC Endpoint
  VpcEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: CreateRdsPrivateLink
    Properties:
      GroupDescription: Security group for RDS VPC Endpoint
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  # Route Table Entry for RDS
  RdsRouteTableEntry:
    Type: AWS::EC2::Route
    Condition: CreateRdsPrivateLink
    Properties:
      RouteTableId: !Ref PrivateRouteTableId
      DestinationCidrBlock: !Sub '${AWS::Region}.rds.amazonaws.com'
      VpcEndpointId: !Ref RdsVpcEndpoint

  # IAM Policy for RDS Access
  RdsAccessPolicy:
    Type: AWS::IAM::Policy
    Condition: CreateRdsPrivateLink
    Properties:
      PolicyName: RdsAccessPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - rds-db:connect
            Resource: !Sub 'arn:aws:rds-db:${AWS::Region}:${AWS::AccountId}:dbuser:${RdsName}/*'
      Roles:
        - !Ref EC2InstanceRole

Outputs:
  InstanceId:
    Description: The Instance ID
    Value: !Ref EC2Instance
  PublicDNS:
    Description: Public DNS of the EC2 instance
    Value: !GetAtt EC2Instance.PublicDnsName
  InstancePublicIp:
    Description: The public IP address of the EC2 instance
    Value: !GetAtt [EC2Instance, PublicIp]
  RdsVpcEndpointId:
    Description: ID of the RDS VPC Endpoint
    Value: !If 
      - CreateRdsPrivateLink
      - !Ref RdsVpcEndpoint
      - "No RDS Private Link created"
